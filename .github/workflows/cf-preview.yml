name: Cloudflare Preview

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKER_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      NPM_CONFIG_USERCONFIG: .npmrc.prod
      NODE_ENV: production
      ENVIRONMENT: development
      CTFL_SPACE_ID: ${{ secrets.CTFL_SPACE_ID }}
      CTFL_DEVELOPMENT_TOKEN: ${{ secrets.CTFL_DEVELOPMENT_TOKEN }}
      CTFL_DEVELOPMENT_HOST: ${{ secrets.CTFL_DEVELOPMENT_HOST }}

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v5

      # Install PNPM
      - name: Install PNPM
        uses: pnpm/action-setup@v5

      # Set up Node.js for PNPM
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      # Install PNPM dependencies
      - name: Install PNPM dependencies
        run: pnpm install --frozen-lockfile --optional

      # Build site
      - name: Build site
        run: pnpm build

      # Upload version
      - name: Upload preview
        id: upload
        run: |
          RESULT=$(pnpm exec wrangler versions upload --preview-alias ${{ github.head_ref }}-${{ github.event.pull_request.number }} --config wrangler.json --env="")

          echo "$RESULT"

          PREVIEW_URL=$(echo "$RESULT" | sed -n 's/^Version Preview Alias URL:[[:space:]]*\(https\?:\/\/[^[:space:]]*\)/\1/p' | head -n1)

          if [ -z "${PREVIEW_URL:-}" ]; then
            echo "Could not extract preview URL from wrangler output" >&2
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      # Preview URL
      - name: Preview URL
        run: echo "Preview URL is ${{ steps.upload.outputs.preview_url }}"

      # Comment preview
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request?.number ?? context.issue.number;
            const body = `🚀 Cloudflare Preview URL: ${{ steps.upload.outputs.preview_url }}<!-- cloudflare-preview -->`;

            // List all comments on the PR (PRs are "issues" in this API)
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });

            // Find existing comment with our marker
            const existing = comments.find(c =>
              typeof c.body === 'string' && c.body.includes('<!-- cloudflare-preview -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
